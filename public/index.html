<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightMind AI</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #ef233c;
  --bg: #000000;
  --bg-sidebar: #060606;
  --bg-topbar: rgba(0,0,0,0.55);
  --bg-input-zone: rgba(0,0,0,0.55);
  --bg-msg-ai: rgba(255,255,255,0.035);
  --bg-input: rgba(255,255,255,0.04);
  --bg-new-btn: rgba(239,35,60,0.1);
  --border: rgba(255,255,255,0.07);
  --border-msg-ai: rgba(255,255,255,0.07);
  --border-input: rgba(255,255,255,0.1);
  --text: #ffffff;
  --text-ai: #d1d1d1;
  --text-muted: #555555;
  --text-hist: #666666;
  --placeholder: #444444;
  --select-bg: #111111;
  --select-color: #aaaaaa;
  --hist-hover: rgba(255,255,255,0.05);
  --scrollbar: rgba(255,255,255,0.08);
  --overlay: rgba(0,0,0,0.7);
}

body.light {
  --bg: #f0f2f5;
  --bg-sidebar: #ffffff;
  --bg-topbar: rgba(255,255,255,0.85);
  --bg-input-zone: rgba(255,255,255,0.85);
  --bg-msg-ai: rgba(0,0,0,0.04);
  --bg-input: rgba(0,0,0,0.05);
  --bg-new-btn: rgba(239,35,60,0.08);
  --border: rgba(0,0,0,0.08);
  --border-msg-ai: rgba(0,0,0,0.08);
  --border-input: rgba(0,0,0,0.12);
  --text: #111111;
  --text-ai: #333333;
  --text-muted: #888888;
  --text-hist: #777777;
  --placeholder: #aaaaaa;
  --select-bg: #f5f5f5;
  --select-color: #555555;
  --hist-hover: rgba(0,0,0,0.05);
  --scrollbar: rgba(0,0,0,0.1);
  --overlay: rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

.manrope { font-family: 'Manrope', sans-serif; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulseDot {
  0%,100%{ opacity:1; transform:scale(1); }
  50%{ opacity:.4; transform:scale(.85); }
}
@keyframes slideIn {
  from { transform: translateX(-100%); }
  to { transform: translateX(0); }
}

/* ======================================
   LAYOUT
====================================== */
.app-wrap {
  display: flex;
  height: 100vh;
  position: relative;
}

/* ======================================
   SIDEBAR OVERLAY (mobile only)
====================================== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 40;
  opacity: 0;
  transition: opacity 0.3s;
}
.sidebar-overlay.show {
  opacity: 1;
}

/* ======================================
   SIDEBAR
====================================== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  transition: background 0.3s, border-color 0.3s, transform 0.3s;
  z-index: 50;
  flex-shrink: 0;
}

/* ======================================
   CHAT ZONE
====================================== */
.chat-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s;
  min-width: 0;
}

/* ======================================
   TOP BAR
====================================== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-topbar);
  backdrop-filter: blur(10px);
  transition: background 0.3s, border-color 0.3s;
  flex-shrink: 0;
  gap: 10px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  flex-shrink: 0;
}
.hamburger span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--text-muted);
  border-radius: 2px;
  transition: background 0.2s;
}
.hamburger:hover span { background: var(--red); }

/* ======================================
   TOGGLE SWITCH
====================================== */
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle-track {
  width: 40px;
  height: 22px;
  border-radius: 50px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  position: relative;
  transition: background 0.3s, border-color 0.3s;
  flex-shrink: 0;
}
body.light .toggle-track {
  background: rgba(0,0,0,0.1);
  border-color: rgba(0,0,0,0.15);
}
.toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #555;
  transition: transform 0.3s, background 0.3s;
  font-size: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
}
body.light .toggle-thumb {
  transform: translateX(18px);
  background: var(--red);
}
.toggle-label {
  font-size: 11px;
  color: var(--text-muted);
  transition: color 0.3s;
  white-space: nowrap;
}

/* ======================================
   MESSAGES
====================================== */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

.msg-user {
  align-self: flex-end;
  max-width: 75%;
  background: rgba(239,35,60,0.10);
  border: 1px solid rgba(239,35,60,0.22);
  border-radius: 18px 18px 5px 18px;
  padding: 11px 16px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--text);
  animation: fadeUp .3s ease;
  word-break: break-word;
}

.msg-ai {
  align-self: flex-start;
  max-width: 85%;
  background: var(--bg-msg-ai);
  border: 1px solid var(--border-msg-ai);
  border-radius: 5px 18px 18px 18px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-ai);
  white-space: pre-wrap;
  animation: fadeUp .3s ease;
  word-break: break-word;
  transition: background 0.3s, border-color 0.3s, color 0.3s;
}

.typing-wrap {
  display: flex;
  gap: 5px;
  padding: 12px 16px;
  border-radius: 5px 18px 18px 18px;
  background: var(--bg-msg-ai);
  border: 1px solid var(--border-msg-ai);
  align-self: flex-start;
  width: fit-content;
}

.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: pulseDot 1.2s infinite;
}
.typing-dot:nth-child(2){ animation-delay:.2s; }
.typing-dot:nth-child(3){ animation-delay:.4s; }

/* ======================================
   INPUT
====================================== */
.input-zone {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-input-zone);
  backdrop-filter: blur(10px);
  transition: background 0.3s, border-color 0.3s;
  flex-shrink: 0;
}

.input-wrap { position: relative; max-width: 760px; margin: 0 auto; }

.chat-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: 50px;
  padding: 13px 52px 13px 20px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s, background 0.3s, color 0.3s;
}
.chat-input:focus { border-color: rgba(239,35,60,0.45); }
.chat-input::placeholder { color: var(--placeholder); }

.send-btn {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  width: 36px; height: 36px;
  border: none; border-radius: 50%;
  background: var(--red);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}
.send-btn:hover { background: #c4162e; }
.send-btn:active { transform: translateY(-50%) scale(0.9); }

/* ======================================
   SIDEBAR ELEMENTS
====================================== */
.new-btn {
  width: 100%;
  padding: 10px;
  border: 1px solid rgba(239,35,60,0.25);
  border-radius: 10px;
  background: var(--bg-new-btn);
  color: var(--red);
  cursor: pointer;
  font-weight: 700;
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  transition: background 0.2s;
}
.new-btn:hover { background: rgba(239,35,60,0.18); }

.hist-item {
  padding: 8px 12px;
  border-radius: 8px;
  color: var(--text-hist);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.15s, color 0.15s;
}
.hist-item:hover { background: var(--hist-hover); }
.hist-item.active { background: rgba(239,35,60,0.1); color: var(--red); }

.clear-btn {
  background: none;
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 8px;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 12px;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
}
.clear-btn:hover { border-color: rgba(239,35,60,0.4); color: var(--red); }

select#modelSelect {
  background: var(--select-bg);
  border: 1px solid var(--border);
  padding: 7px 10px;
  border-radius: 10px;
  color: var(--select-color);
  font-size: 12px;
  width: 100%;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
  outline: none;
}

.cursor-blink {
  display: inline-block;
  width: 2px; height: 14px;
  background: var(--red);
  animation: blink .8s infinite;
  vertical-align: middle;
  margin-left: 2px;
}

#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 20px;
  min-height: 200px;
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: pulseDot 2s infinite;
  flex-shrink: 0;
}

       .quick-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:24px;
  max-width:520px;
}

.quick-btn{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text);
  padding:12px 16px;
  border-radius:14px;
  cursor:pointer;
  font-size:13px;
  transition:all .2s ease;
  backdrop-filter:blur(10px);
}

.quick-btn:hover{
  border-color:rgba(239,35,60,0.45);
  background:rgba(239,35,60,0.08);
  transform:translateY(-2px);
}

body.light .quick-btn{
  background:rgba(0,0,0,0.03);
}

/* ======================================
   MOBILE STYLES
====================================== */
@media (max-width: 768px) {

  html, body {
    overflow-x: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .app-wrap {
    width: 100vw;
    overflow: hidden;
  }

  .hamburger {
    display: flex;
    z-index: 120;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 260px;
    height: 100dvh;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .sidebar-overlay {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .sidebar-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .chat-zone {
    width: 100%;
    min-width: 0;
    height: 100dvh;
    overflow: hidden;
  }

  #messages {
    padding: 16px 12px 10px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .msg-user {
    max-width: 88%;
    font-size: 14px;
  }

  .msg-ai {
    max-width: 92%;
    font-size: 14px;
  }

  .topbar {
    padding: 10px 12px;
    min-height: 56px;
  }

  .input-zone {
    padding: 10px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }

  .input-wrap {
    width: 100%;
  }

  .chat-input {
    width: 100%;
    font-size: 16px;
    padding: 13px 50px 13px 16px;
  }

  .send-btn {
    width: 38px;
    height: 38px;
    right: 5px;
  }

  .toggle-label {
    display: none;
  }

  #welcome {
    padding: 20px 14px;
  }

  #welcome h1 {
    font-size: 22px !important;
  }

  #welcome p {
    font-size: 13px !important;
  }
}
</style>
</head>

<body>

<script>
  function handleEnter(event){
  if(event.key === 'Enter'){
    event.preventDefault();
    sendMessage();
  }
}



// ======================================
// THEME TOGGLE
// ======================================
let isLight = localStorage.getItem('nightmind_theme') === 'light';

function applyTheme(){
  document.body.classList.toggle('light', isLight);
}

function toggleTheme(){
  isLight = !isLight;
  localStorage.setItem('nightmind_theme', isLight ? 'light' : 'dark');
  applyTheme();
}

applyTheme();

// ======================================
// SIDEBAR (mobile)
// ======================================
function openSidebar(){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.add('open');
  ov.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSidebar(){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.remove('open');
  ov.classList.remove('show');
  document.body.style.overflow = '';
}

// Close sidebar on resize to desktop
window.addEventListener('resize', () => {
  if(window.innerWidth > 768) closeSidebar();
});

// ======================================
// CHAT HISTORY
// ======================================
let currentChatId = null;
let chats = JSON.parse(localStorage.getItem('nightmind_chats')) || {};

function saveChats(){
  localStorage.setItem('nightmind_chats', JSON.stringify(chats));
}

function renderHistory(){
  const history = document.getElementById('history');
  history.innerHTML = '';
  Object.keys(chats).reverse().forEach(chatId => {
    const chat = chats[chatId];
    const item = document.createElement('div');
    item.className = 'hist-item ' + (chatId === currentChatId ? 'active' : '');
    item.textContent = chat.title;
    item.onclick = () => {
      loadChat(chatId);
      closeSidebar(); // auto-close on mobile after selecting
    };
    history.appendChild(item);
  });
}

function loadChat(chatId){
  currentChatId = chatId;
  renderHistory();
  const messages = document.getElementById('messages');
  messages.innerHTML = '';
  chats[chatId].messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = msg.role === 'user' ? 'msg-user' : 'msg-ai';
    div.textContent = msg.content;
    messages.appendChild(div);
  });
  messages.scrollTop = messages.scrollHeight;
}

function createChat(firstMessage='New Chat'){
  currentChatId = 'chat_' + Date.now();
  chats[currentChatId] = {
    title: firstMessage.length > 30 ? firstMessage.substring(0,30) + '...' : firstMessage,
    messages: []
  };
  saveChats();
  renderHistory();
}

function saveMessage(role, content){
  if(!currentChatId){ createChat(content); }
  chats[currentChatId].messages.push({ role, content });
  saveChats();
}

function clearMessages(){
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div id="welcome" style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:20px;min-height:200px;">
      <div style="width:56px;height:56px;background:rgba(239,35,60,0.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;">
        <div style="width:20px;height:20px;background:#ef233c;transform:rotate(45deg);border-radius:3px;"></div>
      </div>
      <h1 class="manrope" style="font-size:26px;font-weight:800;margin-bottom:10px;">New Conversation</h1>
      <p style="color:var(--text-muted);font-size:14px;">Ask anything.</p>
    </div>`;
}

function newChat(){
  currentChatId = null;
  clearMessages();
  renderHistory();
  closeSidebar();
}

// ======================================
// SEND MESSAGE
// ======================================
let isBusy = false;

async function sendMessage(){
  if(isBusy) return;

  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';

  const messages = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();

  const userDiv = document.createElement('div');
  userDiv.className = 'msg-user';
  userDiv.textContent = text;
  messages.appendChild(userDiv);
  messages.scrollTop = messages.scrollHeight;
  saveMessage('user', text);

  const typing = document.createElement('div');
  typing.className = 'typing-wrap';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;
  isBusy = true;

  try{
    const model = document.getElementById('modelSelect').value;

    const response = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: 'You are NightMind, a futuristic AI assistant.' },
          { role: 'user', content: text }
        ],
        temperature: 0.7,
        max_tokens: 1000
      })
    });

    const data = await response.json();
    typing.remove();

    let reply = '';
    if(data.choices && data.choices[0] && data.choices[0].message){
      reply = data.choices[0].message.content;
    } else {
      reply = '⚠ Unexpected response: ' + JSON.stringify(data).slice(0, 200);
    }

    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg-ai';
    messages.appendChild(aiDiv);

    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    aiDiv.appendChild(cursor);

    let i = 0;
    function type(){
      if(i < reply.length){
        aiDiv.insertBefore(document.createTextNode(reply[i]), cursor);
        i++;
        messages.scrollTop = messages.scrollHeight;
        setTimeout(type, 8);
      } else {
        cursor.remove();
        saveMessage('assistant', reply);
        isBusy = false;
      }
    }
    type();

  } catch(err){
    typing.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg-ai';
    errDiv.textContent = '⚠ Error: ' + err.message;
    messages.appendChild(errDiv);
    isBusy = false;
  }
}
 
  function quickPrompt(text){
  document.getElementById('chat-input').value = text;
  sendMessage();
}
