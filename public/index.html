<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NightMind AI</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
  --red:#ef233c;
  --bg:#000;
  --bg-sidebar:rgba(10,10,10,0.72);
  --bg-topbar:rgba(0,0,0,0.45);
  --bg-input-zone:rgba(0,0,0,0.45);
  --bg-msg-ai:rgba(255,255,255,0.035);
  --bg-input:rgba(255,255,255,0.04);

  --border:rgba(255,255,255,0.08);
  --border-msg-ai:rgba(255,255,255,0.07);
  --border-input:rgba(255,255,255,0.1);

  --text:#fff;
  --text-ai:#d1d1d1;
  --text-muted:#777;
  --text-hist:#666;
  --placeholder:#555;

  --scrollbar:rgba(255,255,255,0.08);
  --overlay:rgba(0,0,0,0.7);
}

body.light{
  --bg:#f3f5f8;
  --bg-sidebar:rgba(255,255,255,0.78);
  --bg-topbar:rgba(255,255,255,0.7);
  --bg-input-zone:rgba(255,255,255,0.7);
  --bg-msg-ai:rgba(0,0,0,0.04);
  --bg-input:rgba(0,0,0,0.04);

  --border:rgba(0,0,0,0.08);
  --border-msg-ai:rgba(0,0,0,0.08);
  --border-input:rgba(0,0,0,0.1);

  --text:#111;
  --text-ai:#333;
  --text-muted:#777;
  --text-hist:#777;
  --placeholder:#999;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

.manrope{
  font-family:'Manrope',sans-serif;
}

/* ======================================
   AURORA BG
====================================== */

.aurora{
  position:fixed;
  inset:0;
  z-index:-1;

  background:
    radial-gradient(circle at 20% 20%, rgba(239,35,60,.20), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(0,140,255,.15), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,0,180,.12), transparent 30%);

  filter:blur(70px);

  animation:auroraMove 12s infinite alternate ease-in-out;
}

@keyframes auroraMove{
  from{
    transform:translateY(-20px) scale(1);
  }
  to{
    transform:translateY(20px) scale(1.1);
  }
}

/* ======================================
   APP
====================================== */

.app-wrap{
  display:flex;
  height:100vh;
  position:relative;
}

/* ======================================
   SIDEBAR
====================================== */

.sidebar{
  width:260px;
  min-width:260px;
  height:100vh;

  background:var(--bg-sidebar);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

  border-right:1px solid var(--border);

  display:flex;
  flex-direction:column;

  z-index:50;

  transition:.3s;
}

.sidebar-overlay{
  display:none;
}

.chat-zone{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* ======================================
   TOPBAR
====================================== */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 20px;

  background:var(--bg-topbar);

  backdrop-filter:blur(10px);

  border-bottom:1px solid var(--border);

  z-index:10;
}

.topbar-left,
.topbar-right{
  display:flex;
  align-items:center;
  gap:12px;
}

.hamburger{
  display:none;
  flex-direction:column;
  gap:4px;
  cursor:pointer;
}

.hamburger span{
  width:20px;
  height:2px;
  background:var(--text);
  border-radius:2px;
}

/* ======================================
   TOGGLE
====================================== */

.toggle-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.toggle-track{
  width:42px;
  height:22px;
  border-radius:50px;
  position:relative;

  background:rgba(255,255,255,.08);
}

.toggle-thumb{
  position:absolute;
  top:2px;
  left:2px;

  width:18px;
  height:18px;

  border-radius:50%;

  background:#666;

  transition:.3s;
}

body.light .toggle-thumb{
  transform:translateX(20px);
  background:var(--red);
}

/* ======================================
   CHAT
====================================== */

#messages{
  flex:1;
  overflow-y:auto;

  padding:24px 20px;

  display:flex;
  flex-direction:column;
  gap:14px;

  scroll-behavior:smooth;
}

#messages::-webkit-scrollbar{
  width:3px;
}

#messages::-webkit-scrollbar-thumb{
  background:var(--scrollbar);
  border-radius:20px;
}

.msg-user,
.msg-ai{
  max-width:85%;
  padding:12px 16px;

  line-height:1.7;
  font-size:14px;

  animation:fadeUp .25s ease;

  transition:
    transform .2s ease,
    box-shadow .2s ease,
    border-color .2s ease;
}

.msg-user:hover,
.msg-ai:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,0,0,.25);
}

.msg-user{
  align-self:flex-end;

  background:rgba(239,35,60,.10);

  border:1px solid rgba(239,35,60,.25);

  border-radius:18px 18px 5px 18px;
}

.msg-ai{
  align-self:flex-start;

  background:var(--bg-msg-ai);

  border:1px solid var(--border-msg-ai);

  border-radius:5px 18px 18px 18px;

  color:var(--text-ai);

  white-space:pre-wrap;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ======================================
   TYPING
====================================== */

.typing-wrap{
  background:var(--bg-msg-ai);

  border:1px solid var(--border-msg-ai);

  padding:12px 16px;

  border-radius:5px 18px 18px 18px;

  width:fit-content;
}

.live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--red);

  animation:pulseDot 1.5s infinite;
}

@keyframes pulseDot{
  0%,100%{
    opacity:1;
    transform:scale(1);
  }
  50%{
    opacity:.4;
    transform:scale(.85);
  }
}

/* ======================================
   WELCOME
====================================== */

#welcome{
  flex:1;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  padding:20px;
}

.ai-orb{
  width:90px;
  height:90px;

  border-radius:50%;

  background:
    radial-gradient(circle at 30% 30%, #ff4d6d, #ef233c);

  box-shadow:
    0 0 30px rgba(239,35,60,.5),
    0 0 80px rgba(239,35,60,.2);

  margin-bottom:24px;

  animation:floatOrb 4s ease-in-out infinite;
}

@keyframes floatOrb{
  0%,100%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-10px);
  }
}

.quick-actions{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;

  max-width:520px;

  margin-top:28px;
}

.quick-btn{
  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  color:var(--text);

  padding:12px 16px;

  border-radius:14px;

  cursor:pointer;

  font-size:13px;

  transition:.2s;

  backdrop-filter:blur(10px);
}

.quick-btn:hover{
  transform:translateY(-2px);

  border-color:rgba(239,35,60,.45);

  background:rgba(239,35,60,.08);
}

/* ======================================
   INPUT
====================================== */

.input-zone{
  padding:12px 16px 16px;

  background:var(--bg-input-zone);

  border-top:1px solid var(--border);

  backdrop-filter:blur(10px);
}

.input-wrap{
  position:relative;
  max-width:760px;
  margin:0 auto;
}

.chat-input{
  width:100%;

  resize:none;

  min-height:54px;
  max-height:160px;

  overflow-y:auto;

  border:none;
  outline:none;

  border-radius:22px;

  background:var(--bg-input);

  border:1px solid var(--border-input);

  padding:16px 56px 16px 18px;

  color:var(--text);

  font-size:15px;

  font-family:'Inter',sans-serif;

  transition:.3s;
}

.chat-input:focus{
  border-color:rgba(239,35,60,.4);

  box-shadow:
    0 0 0 1px rgba(239,35,60,.4),
    0 0 25px rgba(239,35,60,.15);
}

.chat-input::placeholder{
  color:var(--placeholder);
}

.send-btn{
  position:absolute;
  right:8px;
  bottom:8px;

  width:40px;
  height:40px;

  border:none;

  border-radius:50%;

  background:var(--red);

  color:#fff;

  cursor:pointer;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:.2s;
}

.send-btn:hover{
  transform:scale(1.05);
}

/* ======================================
   SIDEBAR BUTTONS
====================================== */

.new-btn,
.clear-btn{
  cursor:pointer;
}

.new-btn{
  width:100%;

  border:none;

  padding:11px;

  border-radius:12px;

  background:rgba(239,35,60,.12);

  color:var(--red);

  font-weight:700;
}

.hist-item{
  padding:9px 12px;

  border-radius:10px;

  color:var(--text-hist);

  font-size:13px;

  cursor:pointer;

  transition:.2s;

  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.hist-item:hover{
  background:rgba(255,255,255,.05);
}

.hist-item.active{
  background:rgba(239,35,60,.10);

  color:var(--red);
}

/* ======================================
   MOBILE
====================================== */

@media(max-width:768px){

  .hamburger{
    display:flex;
  }

  .sidebar{
    position:fixed;
    top:0;
    left:0;

    transform:translateX(-100%);

    transition:.3s ease;

    z-index:100;
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .sidebar-overlay{
    display:block;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    opacity:0;

    pointer-events:none;

    transition:.3s;

    z-index:90;
  }

  .sidebar-overlay.show{
    opacity:1;
    pointer-events:auto;
  }

  #messages{
    padding:16px 12px;
  }

  .msg-user{
    max-width:88%;
  }

  .msg-ai{
    max-width:92%;
  }

  .chat-input{
    font-size:16px;
  }

  .toggle-label{
    display:none;
  }

}

</style>
</head>

<body>

<div class="aurora"></div>

<div class="app-wrap">

  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->

  <div class="sidebar" id="sidebar">

    <div style="padding:18px;border-bottom:1px solid var(--border);">

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">

        <div style="width:10px;height:10px;background:#ef233c;transform:rotate(45deg);border-radius:2px;"></div>

        <span class="manrope" style="font-weight:800;font-size:15px;">
          NightMind
        </span>

      </div>

      <button class="new-btn" onclick="newChat()">
        + New Conversation
      </button>

    </div>

    <div style="padding:12px 16px 6px;font-size:10px;color:var(--text-muted);letter-spacing:1px;font-weight:700;text-transform:uppercase;">
      Conversations
    </div>

    <div id="history" style="flex:1;padding:0 8px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;"></div>

  </div>

  <!-- CHAT -->

  <div class="chat-zone">

    <div class="topbar">

      <div class="topbar-left">

        <div class="hamburger" onclick="openSidebar()">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="live-dot"></div>

        <span style="font-size:12px;color:var(--text-muted);font-weight:600;">
          ONLINE
        </span>

      </div>

      <div class="topbar-right">

        <div class="toggle-wrap" onclick="toggleTheme()">

          <span>🌙</span>

          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>

          <span class="toggle-label" style="font-size:12px;color:var(--text-muted);">
            Theme
          </span>

        </div>

      </div>

    </div>

    <!-- MESSAGES -->

    <div id="messages">

      <div id="welcome">

        <div class="ai-orb"></div>

        <h1 class="manrope" style="font-size:34px;font-weight:800;margin-bottom:10px;">
          What's on your mind?
        </h1>

        <p style="color:var(--text-muted);max-width:420px;line-height:1.7;">
          NightMind powered by Groq AI.
        </p>

        <div class="quick-actions">

          <button class="quick-btn" onclick="quickPrompt('Explain black holes simply')">
            🌌 Explain Black Holes
          </button>

          <button class="quick-btn" onclick="quickPrompt('Help me debug my code')">
            💻 Debug Code
          </button>

          <button class="quick-btn" onclick="quickPrompt('Give me startup ideas')">
            🚀 Startup Ideas
          </button>

          <button class="quick-btn" onclick="quickPrompt('Teach me something interesting')">
            🧠 Teach Me Something
          </button>

        </div>

      </div>

    </div>

    <!-- INPUT -->

    <div class="input-zone">

      <div class="input-wrap">

        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Message NightMind..."
          onkeydown="handleEnter(event)"
        ></textarea>

        <button class="send-btn" onclick="sendMessage()">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>

        </button>

      </div>

    </div>

  </div>

</div>

<script>

/* ======================================
   TYPE SOUND
====================================== */

const typeSound = new Audio(
  "https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"
);

function playTypeSound(){
  typeSound.currentTime = 0;
  typeSound.volume = 0.08;
  typeSound.play();
}

/* ======================================
   ENTER
====================================== */

function handleEnter(event){

  if(event.key === 'Enter' && !event.shiftKey){

    event.preventDefault();

    sendMessage();
  }

}

/* ======================================
   AUTO RESIZE
====================================== */

const chatInput = document.getElementById('chat-input');

chatInput.addEventListener('input', () => {

  chatInput.style.height = 'auto';

  chatInput.style.height = chatInput.scrollHeight + 'px';

});

/* ======================================
   THEME
====================================== */

let isLight = localStorage.getItem('nightmind_theme') === 'light';

function applyTheme(){

  document.body.classList.toggle('light', isLight);

}

function toggleTheme(){

  isLight = !isLight;

  localStorage.setItem(
    'nightmind_theme',
    isLight ? 'light' : 'dark'
  );

  applyTheme();

}

applyTheme();

/* ======================================
   SIDEBAR
====================================== */

function openSidebar(){

  document
    .getElementById('sidebar')
    .classList.add('open');

  document
    .getElementById('overlay')
    .classList.add('show');

}

function closeSidebar(){

  document
    .getElementById('sidebar')
    .classList.remove('open');

  document
    .getElementById('overlay')
    .classList.remove('show');

}

window.addEventListener('resize', () => {

  if(window.innerWidth > 768){

    closeSidebar();

  }

});

/* ======================================
   CHAT HISTORY
====================================== */

let currentChatId = null;

let chats = JSON.parse(
  localStorage.getItem('nightmind_chats')
) || {};

function saveChats(){

  localStorage.setItem(
    'nightmind_chats',
    JSON.stringify(chats)
  );

}

function renderHistory(){

  const history = document.getElementById('history');

  history.innerHTML = '';

  Object.keys(chats)
    .reverse()
    .forEach(chatId => {

      const chat = chats[chatId];

      const item = document.createElement('div');

      item.className =
        'hist-item ' +
        (chatId === currentChatId ? 'active' : '');

      item.textContent = chat.title;

      item.onclick = () => {

        loadChat(chatId);

        closeSidebar();

      };

      history.appendChild(item);

    });

}

function createChat(firstMessage='New Chat'){

  currentChatId = 'chat_' + Date.now();

  chats[currentChatId] = {

    title:
      firstMessage.length > 30
      ? firstMessage.substring(0,30) + '...'
      : firstMessage,

    messages:[]
  };

  saveChats();

  renderHistory();

}

function saveMessage(role, content){

  if(!currentChatId){

    createChat(content);

  }

  chats[currentChatId].messages.push({
    role,
    content
  });

  saveChats();

}

function loadChat(chatId){

  currentChatId = chatId;

  renderHistory();

  const messages =
    document.getElementById('messages');

  messages.innerHTML = '';

  chats[chatId].messages.forEach(msg => {

    const div = document.createElement('div');

    div.className =
      msg.role === 'user'
      ? 'msg-user'
      : 'msg-ai';

    div.textContent = msg.content;

    messages.appendChild(div);

  });

}

function newChat(){

  currentChatId = null;

  const messages =
    document.getElementById('messages');

  messages.innerHTML = `

    <div id="welcome">

      <div style="
        width:70px;
        height:70px;
        background:rgba(239,35,60,0.12);
        border-radius:22px;
        display:flex;
        align-items:center;
        justify-content:center;
        margin-bottom:22px;
        box-shadow:0 0 35px rgba(239,35,60,0.18);
      ">
        <div style="
          width:24px;
          height:24px;
          background:#ef233c;
          transform:rotate(45deg);
          border-radius:4px;
        "></div>
      </div>

      <h1 class="manrope" style="
        font-size:34px;
        font-weight:800;
        margin-bottom:12px;
      ">
        What's on your mind?
      </h1>

      <p style="
        color:var(--text-muted);
        max-width:500px;
        line-height:1.8;
        font-size:15px;
        margin-bottom:10px;
      ">
        NightMind powered by Groq AI.
      </p>

      <div class="quick-actions">

        <button class="quick-btn" onclick="quickPrompt('Explain black holes simply')">
          🌌 Explain Black Holes
        </button>

        <button class="quick-btn" onclick="quickPrompt('Help me debug my code')">
          💻 Debug Code
        </button>

        <button class="quick-btn" onclick="quickPrompt('Give me startup ideas')">
          🚀 Startup Ideas
        </button>

        <button class="quick-btn" onclick="quickPrompt('Teach me something interesting')">
          🧠 Teach Me Something
        </button>

      </div>

    </div>
  `;

  renderHistory();

  closeSidebar();

}

/* ======================================
   QUICK PROMPT
====================================== */

function quickPrompt(text){

  document.getElementById('chat-input').value = text;

  sendMessage();

}

/* ======================================
   SEND MESSAGE
====================================== */

let isBusy = false;

async function sendMessage(){

  if(isBusy) return;

  const input =
    document.getElementById('chat-input');

  const text = input.value.trim();

  if(!text) return;

  input.value = '';
  input.style.height = '54px';

  const messages =
    document.getElementById('messages');

  const welcome =
    document.getElementById('welcome');

  if(welcome) welcome.remove();

  const userDiv = document.createElement('div');

  userDiv.className = 'msg-user';

  userDiv.textContent = text;

  messages.appendChild(userDiv);

  messages.scrollTop = messages.scrollHeight;

  saveMessage('user', text);

  const typing = document.createElement('div');

  typing.className = 'typing-wrap';

  typing.innerHTML = `
    <div style="
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:var(--text-muted);
    ">
      <div class="live-dot"></div>
      NightMind is thinking...
    </div>
  `;

  messages.appendChild(typing);

  messages.scrollTop = messages.scrollHeight;

  isBusy = true;

  try{

    const response = await fetch('/chat',{

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        model:'llama-3.3-70b-versatile',

        messages:[
          {
            role:'user',
            content:text
          }
        ],

        temperature:0.7,

        max_tokens:1000

      })

    });

    const data = await response.json();

    typing.remove();

    let reply = '';

    if(
      data.choices &&
      data.choices[0] &&
      data.choices[0].message
    ){

      reply = data.choices[0].message.content;

    } else {

      reply =
        '⚠ Unexpected response';

    }

    const aiDiv = document.createElement('div');

    aiDiv.className = 'msg-ai';

    messages.appendChild(aiDiv);

    let i = 0;

    function type(){

      if(i < reply.length){

        aiDiv.textContent += reply[i];

        i++;

        if(i % 8 === 0){

          playTypeSound();

        }

        messages.scrollTop =
          messages.scrollHeight;

        setTimeout(type, 8);

      } else {

        saveMessage('assistant', reply);

        isBusy = false;

      }

    }

    type();

  } catch(err){

    typing.remove();

    const errDiv =
      document.createElement('div');

    errDiv.className = 'msg-ai';

    errDiv.textContent =
      '⚠ Error: ' + err.message;

    messages.appendChild(errDiv);

    isBusy = false;

  }

}

/* ======================================
   LOAD SAVED CHATS
====================================== */

setTimeout(() => {

  const ids = Object.keys(chats);

  if(ids.length > 0){

    currentChatId = ids[ids.length - 1];

    renderHistory();

    loadChat(currentChatId);

  } else {

    renderHistory();

  }

},100);

</script>

</body>
</html>
