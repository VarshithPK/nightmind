<script>
/* =========================
   MEDIA RECORDER VOICE
========================= */
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isSpeaking = false;
let mediaStream = null;

async function toggleRecording(){
  if(isSpeaking){
    window.speechSynthesis && window.speechSynthesis.cancel();
    isSpeaking = false;
    setOrbState('idle');
    return;
  }
  if(isRecording){
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording(){
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // Pick best supported format
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/webm')
      ? 'audio/webm'
      : 'audio/ogg';

    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if(e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      // Stop all mic tracks
      mediaStream.getTracks().forEach(t => t.stop());
      setOrbState('processing');
      await transcribeAudio();
    };

    mediaRecorder.start(100); // collect data every 100ms
    isRecording = true;
    setOrbState('recording');

  } catch(err){
    if(err.name === 'NotAllowedError'){
      alert('Microphone access blocked! Please allow microphone in your browser settings.');
    } else {
      alert('Could not access microphone: ' + err.message);
    }
  }
}

function stopRecording(){
  if(mediaRecorder && mediaRecorder.state !== 'inactive'){
    isRecording = false;
    mediaRecorder.stop();
  }
}

async function transcribeAudio(){
  try {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });

    // Check if audio is too short (less than 0.5s ≈ 5000 bytes)
    if(blob.size < 5000){
      setOrbState('idle');
      document.getElementById('orbStatus').textContent = 'Too short — try again';
      setTimeout(() => setOrbState('idle'), 2000);
      return;
    }

    const formData = new FormData();
    formData.append('audio', blob, 'audio.webm');

    const res = await fetch('/transcribe', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if(data.text && data.text.trim()){
      chatInput.value = data.text.trim();
      setOrbState('idle');
      window._lastInputWasVoice = true;
      sendMessage();
    } else {
      setOrbState('idle');
      document.getElementById('orbStatus').textContent = "Couldn't hear you — try again";
      setTimeout(() => setOrbState('idle'), 2000);
    }
  } catch(err){
    setOrbState('idle');
    document.getElementById('orbStatus').textContent = '⚠ Transcription failed';
    setTimeout(() => setOrbState('idle'), 2000);
  }
}

function setOrbState(state){
  const orb = document.getElementById('mainOrb');
  const status = document.getElementById('orbStatus');
  const ripples = document.getElementById('orbRipples');
  const micBtn = document.getElementById('micBtn');
  if(!orb) return;

  orb.classList.remove('recording','processing','speaking');
  status.classList.remove('recording','processing','speaking');
  ripples.classList.add('hidden');
  micBtn.classList.remove('active');

  if(state === 'recording'){
    orb.classList.add('recording');
    status.classList.add('recording');
    status.textContent = '🔴 Recording... click to stop';
    ripples.classList.remove('hidden');
    micBtn.classList.add('active');
    micBtn.textContent = '⏹';
    chatInput.placeholder = 'Recording...';
  } else if(state === 'processing'){
    orb.classList.add('processing');
    status.classList.add('processing');
    status.textContent = '⏳ Transcribing...';
    micBtn.textContent = '⏳';
  } else if(state === 'speaking'){
    orb.classList.add('speaking');
    status.classList.add('speaking');
    status.textContent = '🔊 Speaking... click to stop';
    micBtn.textContent = '⏹';
  } else {
    status.textContent = 'Click orb to speak';
    micBtn.textContent = '🎤';
    chatInput.placeholder = 'Message NightMind... (or click 🎤 to speak)';
  }
}

/* Speak AI reply */
let currentUtterance = null;

function speakReply(text){

  if(!window.speechSynthesis) return;

  // STOP OLD SPEECH
  window.speechSynthesis.cancel();

  isSpeaking = true;
  setOrbState('speaking');

  const clean = text
    .replace(/\*\*/g,'')
    .replace(/\*/g,'')
    .replace(/#{1,6} /g,'')
    .replace(/`/g,'');

  currentUtterance = new SpeechSynthesisUtterance(clean);

  currentUtterance.rate = 1;
  currentUtterance.pitch = 1;
  currentUtterance.volume = 1;
  currentUtterance.lang = 'en-US';

  // BETTER MOBILE VOICE SELECTION
  const voices = speechSynthesis.getVoices();

  const preferred =
    voices.find(v => v.lang.includes('en-US')) ||
    voices.find(v => v.lang.includes('en')) ||
    voices[0];

  if(preferred){
    currentUtterance.voice = preferred;
  }

  currentUtterance.onend = () => {
    isSpeaking = false;
    setOrbState('idle');
  };

  currentUtterance.onerror = () => {
    isSpeaking = false;
    setOrbState('idle');
  };

  speechSynthesis.speak(currentUtterance);
}window.speechSynthesis && (window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices());

/* CHAT STORAGE */
let currentChatId = null;

let chats =
  JSON.parse(
    localStorage.getItem('nightmind_chats')
  ) || {};

function saveChats() {

  localStorage.setItem(
    'nightmind_chats',
    JSON.stringify(chats)
  );
}

function renderHistory() {

  const history =
    document.getElementById('history');

  history.innerHTML = '';

  Object.keys(chats)
    .reverse()
    .forEach(chatId => {

      const item =
        document.createElement('div');

      item.className =
        'hist-item ' +
        (chatId === currentChatId
          ? 'active'
          : '');

      item.textContent =
        chats[chatId].title;

      item.onclick = () => {

        loadChat(chatId);
        closeSidebar();
      };

      history.appendChild(item);
    });
}

function createChat(firstMessage = 'New Chat') {

  let smartTitle = firstMessage
    .replace(/\n/g, ' ')
    .replace(/[^\w\s]/gi, '')
    .trim();

  smartTitle =
    smartTitle.substring(0, 35);

  smartTitle =
    smartTitle.charAt(0).toUpperCase() +
    smartTitle.slice(1);

  if (
    !smartTitle ||
    smartTitle.length < 2
  ) {
    smartTitle = 'New Chat';
  }

  currentChatId =
    'chat_' + Date.now();

  chats[currentChatId] = {
    title: smartTitle,
    messages: []
  };

  saveChats();
  renderHistory();
}

async function generateChatTitle(messages) {

  try {

    const response =
      await fetch('/chat', {

      method: 'POST',

      headers: {
        'Content-Type':
          'application/json'
      },

      body: JSON.stringify({

        model:
          document.getElementById(
            'modelSelect'
          ).value,

        messages: [

          {
            role: 'system',

            content:
`Generate a short modern chat title.

Rules:
- 2 to 5 words
- no quotes
- no punctuation
- summarize naturally
- sound like ChatGPT titles`
          },

          ...messages.slice(0, 4)
        ],

        temperature: 0.3,
        max_tokens: 20
      })
    });

    const data =
      await response.json();

    return (
      data.choices?.[0]?.message?.content?.trim()
      || 'New Chat'
    );

  } catch (err) {

    console.error(err);

    return 'New Chat';
  }
}

function saveMessage(role, content) {

  if (!currentChatId) {
    createChat(content);
  }

  chats[currentChatId]
    .messages
    .push({
      role,
      content
    });

  saveChats();
}

function loadChat(chatId) {

  currentChatId = chatId;

  renderHistory();

  const messages =
    document.getElementById('messages');

  messages.innerHTML = '';

  chats[chatId]
    .messages
    .forEach(msg => {

      const div =
        document.createElement('div');

      div.className =
        msg.role === 'user'
          ? 'msg-user'
          : 'msg-ai';

      div.textContent =
        msg.content;

      messages.appendChild(div);
    });

  messages.scrollTop =
    messages.scrollHeight;

/* SEND MESSAGE */
/* SEND MESSAGE */
let isBusy = false;

async function sendMessage(){

  if(isBusy) return;

  const text = chatInput.value.trim();

  if(!text) return;

  chatInput.value = '';
  chatInput.style.height = '56px';

  const messages =
    document.getElementById('messages');

  const welcome =
    document.getElementById('welcome');

  if(welcome) welcome.remove();

  const userDiv =
    document.createElement('div');

  userDiv.className = 'msg-user';
  userDiv.textContent = text;

  messages.appendChild(userDiv);

  messages.scrollTop =
    messages.scrollHeight;

  if (!currentChatId) {
    createChat(text);
  }

  saveMessage('user', text);

  const typing =
    document.createElement('div');

  typing.className = 'typing-wrap';

  typing.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;">
      <div class="live-dot"></div>
      NightMind is thinking...
    </div>
  `;

  messages.appendChild(typing);

  messages.scrollTop =
    messages.scrollHeight;

  isBusy = true;

  try {

    const selectedModel =
      document.getElementById('modelSelect').value;

    const response =
      await fetch('/chat', {

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body: JSON.stringify({

        model: selectedModel,

        messages:
          chats[currentChatId]
          ? chats[currentChatId].messages.slice(-20)
          : [{role:'user',content:text}],

        temperature: 0.7,
        max_tokens: 1000
      })
    });

    if(!response.ok){
      throw new Error(
        'Server Error ' + response.status
      );
    }

    const data =
      await response.json();

    typing.remove();

    let reply = '';

    if(
      data.choices &&
      data.choices[0] &&
      data.choices[0].message
    ){

      reply =
        data.choices[0].message.content;

    } else {

      reply =
        '⚠ Unexpected response';
    }

    const aiDiv =
      document.createElement('div');

    aiDiv.className = 'msg-ai';

    messages.appendChild(aiDiv);

    const wasVoice =
      !!window._lastInputWasVoice;

    window._lastInputWasVoice = false;

    let i = 0;

    let spokenChunk = '';

    function speakChunk(text){

      if(!window.speechSynthesis) return;

      const clean = text
        .replace(/\*\*/g,'')
        .replace(/\*/g,'')
        .replace(/#{1,6} /g,'')
        .replace(/`/g,'');

      const utter =
        new SpeechSynthesisUtterance(clean);

      utter.rate = 1;
      utter.pitch = 1;
      utter.volume = 1;
      utter.lang = 'en-US';

      const voices =
        speechSynthesis.getVoices();

      const preferred =
        voices.find(v => v.lang.includes('en-US')) ||
        voices.find(v => v.lang.includes('en')) ||
        voices[0];

      if(preferred){
        utter.voice = preferred;
      }

      isSpeaking = true;

      setOrbState('speaking');

      utter.onend = () => {

        if(!speechSynthesis.speaking){

          isSpeaking = false;

          setOrbState('idle');
        }
      };

      utter.onerror = () => {

        isSpeaking = false;

        setOrbState('idle');
      };

      speechSynthesis.speak(utter);
    }

    function type(){

      if(i < reply.length){

        aiDiv.textContent += reply[i];

        spokenChunk += reply[i];

        messages.scrollTop =
          messages.scrollHeight;

        if(
          wasVoice &&
          (
            reply[i] === '.' ||
            reply[i] === '?' ||
            reply[i] === '!' ||
            spokenChunk.length > 120
          )
        ){

          speakChunk(spokenChunk);

          spokenChunk = '';
        }

        i++;

        setTimeout(type, 7);

      } else {

        if(
          wasVoice &&
          spokenChunk.trim()
        ){
          speakChunk(spokenChunk);
        }

        saveMessage(
          'assistant',
          reply
        );

        if(
          chats[currentChatId] &&
          chats[currentChatId].messages.length === 2
        ){

          generateChatTitle(
            chats[currentChatId].messages
          ).then(title => {

            chats[currentChatId].title =
              title;

            saveChats();

            renderHistory();
          });
        }

        isBusy = false;
      }
    }

    type();

  } catch(err){

    typing.remove();

    const errDiv =
      document.createElement('div');

    errDiv.className = 'msg-ai';

    errDiv.textContent =
      '⚠ ' + err.message;

    messages.appendChild(errDiv);

    isBusy = false;
  }
}
