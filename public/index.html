<style>
/* ===== VARIABLES ===== */
:root {
  --red: #ef233c;
  --red2: #ff4d6d;
  --bg: #050505;
  --bg-sidebar: rgba(10,10,10,.78);
  --bg-topbar: rgba(0,0,0,.45);
  --bg-input-zone: rgba(0,0,0,.45);
  --bg-msg-ai: rgba(255,255,255,.035);
  --bg-input: rgba(255,255,255,.04);
  --border: rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.06);
  --text: #fff;
  --text2: #d4d4d4;
  --muted: #777;
  --placeholder: #555;
  --shadow-red: 0 0 30px rgba(239,35,60,.6), 0 0 80px rgba(239,35,60,.25);
}
body.light {
  --bg: #f4f6fb;
  --bg-sidebar: rgba(255,255,255,.75);
  --bg-topbar: rgba(255,255,255,.7);
  --bg-input-zone: rgba(255,255,255,.75);
  --bg-msg-ai: rgba(0,0,0,.04);
  --bg-input: rgba(0,0,0,.04);
  --border: rgba(0,0,0,.08);
  --border2: rgba(0,0,0,.06);
  --text: #111;
  --text2: #333;
  --muted: #777;
  --placeholder: #999;
  --shadow-red: 0 0 25px rgba(239,35,60,.25), 0 0 60px rgba(239,35,60,.1);
}

/* ===== RESET ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  transition: background .3s ease, color .3s ease;
}

/* ===== AURORA BG ===== */
.aurora {
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(circle at 20% 20%, rgba(239,35,60,.22), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(0,120,255,.15), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,0,170,.12), transparent 30%);
  filter: blur(80px);
  animation: auroraMove 12s infinite alternate ease-in-out;
}
@keyframes auroraMove {
  from { transform: translateY(-20px) scale(1); }
  to   { transform: translateY(20px)  scale(1.1); }
}

/* ===== LAYOUT ===== */
.app { display: flex; height: 100vh; width: 100%; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 270px;
  min-width: 270px;
  height: 100vh;
  background: var(--bg-sidebar);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform .3s ease;
}
.sidebar-top { padding: 18px; border-bottom: 1px solid var(--border); }
.logo-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.logo-icon {
  width: 11px; height: 11px;
  background: var(--red);
  transform: rotate(45deg);
  border-radius: 2px;
  box-shadow: 0 0 15px rgba(239,35,60,.8);
  flex-shrink: 0;
}
.logo-text { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 15px; }
.new-btn {
  width: 100%;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 14px;
  background: rgba(239,35,60,.12);
  color: var(--red);
  font-weight: 700;
  cursor: pointer;
  transition: background .2s ease, transform .2s ease;
}
.new-btn:hover { background: rgba(239,35,60,.18); transform: translateY(-1px); }
.history-title {
  padding: 14px 16px 8px;
  font-size: 10px;
  letter-spacing: 1px;
  font-weight: 700;
  color: var(--muted);
}
#history { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
#history::-webkit-scrollbar { width: 4px; }
#history::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 20px; }
.hist-item {
  padding: 10px 12px;
  border-radius: 12px;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  transition: background .2s ease, color .2s ease;
}
.hist-item:hover { background: rgba(255,255,255,.04); }
.hist-item.active { background: rgba(239,35,60,.12); color: var(--red); }
.sidebar-bottom { padding: 16px; border-top: 1px solid var(--border); }
.model-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
#modelSelect {
  width: 100%;
  padding: 11px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.04);
  color: var(--text);
  outline: none;
  font-size: 13px;
  margin-bottom: 16px;
  cursor: pointer;
}
.user-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(239,35,60,.14), rgba(255,255,255,.03));
  border: 1px solid var(--border2);
}
.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--red), var(--red2));
  color: #fff;
  font-weight: 800;
  box-shadow: var(--shadow-red);
  flex-shrink: 0;
}
.online-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #00ff88;
  margin-left: auto;
  box-shadow: 0 0 12px #00ff88;
  flex-shrink: 0;
}

/* ===== CHAT ZONE ===== */
.chat-zone { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ===== TOPBAR ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-topbar);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.topbar-left, .topbar-right { display: flex; align-items: center; gap: 12px; }
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 1.4s infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .35; }
}
.online-text { font-size: 12px; font-weight: 600; color: var(--muted); }
.toggle-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.toggle-track {
  width: 42px; height: 22px;
  border-radius: 30px;
  background: rgba(255,255,255,.08);
  position: relative;
}
.toggle-thumb {
  position: absolute;
  width: 18px; height: 18px;
  top: 2px; left: 2px;
  border-radius: 50%;
  background: #777;
  transition: transform .3s ease, background .3s ease;
}
body.light .toggle-thumb { transform: translateX(20px); background: var(--red); }
.hamburger { display: none; flex-direction: column; gap: 4px; cursor: pointer; }
.hamburger span { width: 20px; height: 2px; background: var(--text); border-radius: 10px; display: block; }

/* ===== MESSAGES ===== */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 20px; }

.msg-user, .msg-ai {
  max-width: 85%;
  padding: 13px 16px;
  line-height: 1.7;
  font-size: 14px;
  animation: fadeUp .25s ease;
  transition: transform .2s ease;
  word-break: break-word;
}
.msg-user:hover, .msg-ai:hover { transform: translateY(-2px); }
.msg-user {
  align-self: flex-end;
  background: rgba(239,35,60,.12);
  border: 1px solid rgba(239,35,60,.22);
  border-radius: 18px 18px 5px 18px;
  white-space: pre-wrap;
}
.msg-ai {
  align-self: flex-start;
  background: var(--bg-msg-ai);
  border: 1px solid var(--border2);
  border-radius: 5px 18px 18px 18px;
  color: var(--text2);
  white-space: pre-wrap;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== WELCOME SCREEN ===== */
#welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}
.orb-wrap {
  position: relative;
  margin-bottom: 26px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.ai-orb {
  position: relative;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffb8c5 0%, #ff4d6d 15%, #ef233c 35%, #6d0014 100%);
  box-shadow: 0 0 35px rgba(255,0,70,.85), 0 0 100px rgba(255,0,70,.35);
  animation: orbFloat 5s ease-in-out infinite, orbPulse 3s ease-in-out infinite;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s ease, box-shadow .2s ease;
  user-select: none;
}
.ai-orb:hover {
  transform: scale(1.07) translateY(-4px);
  box-shadow: 0 0 50px rgba(255,0,70,1), 0 0 120px rgba(255,0,70,.5);
}
.ai-orb::before {
  content: '';
  position: absolute;
  inset: -20%;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.18), transparent 60%),
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), transparent 40%);
  filter: blur(10px);
  animation: energyFlow 6s ease-in-out infinite alternate;
}
.ai-orb::after {
  content: '';
  position: absolute;
  inset: 12px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(255,255,255,.45), transparent 45%);
}
.ai-orb.recording {
  animation: orbListening .6s ease-in-out infinite !important;
  box-shadow: 0 0 60px rgba(255,0,70,1), 0 0 150px rgba(255,0,70,.7) !important;
}
@keyframes orbListening {
  0%, 100% { transform: scale(1.1); }
  50%       { transform: scale(1.18); }
}
.ai-orb.processing {
  animation: orbProcessing 1s ease-in-out infinite !important;
  box-shadow: 0 0 40px rgba(255,165,0,.9), 0 0 100px rgba(255,165,0,.4) !important;
  background: radial-gradient(circle at 30% 30%, #ffe8b8 0%, #ffb84d 15%, #ef8c23 35%, #663800 100%) !important;
}
@keyframes orbProcessing {
  0%, 100% { transform: scale(1.05); }
  50%       { transform: scale(1.1); }
}
.ai-orb.speaking {
  animation: orbSpeaking .5s ease-in-out infinite !important;
  box-shadow: 0 0 40px rgba(0,150,255,.9), 0 0 100px rgba(0,150,255,.4) !important;
  background: radial-gradient(circle at 30% 30%, #b8d4ff 0%, #4d9fff 15%, #2369ef 35%, #001466 100%) !important;
}
@keyframes orbSpeaking {
  0%, 100% { transform: scale(1.08); }
  50%       { transform: scale(1.14); }
}
.orb-status {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: .5px;
  height: 18px;
  transition: color .3s;
}
.orb-status.recording  { color: var(--red); }
.orb-status.processing { color: #ffb84d; }
.orb-status.speaking   { color: #4d9fff; }
.orb-ripples {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 120px; height: 120px;
  border-radius: 50%;
  pointer-events: none;
  z-index: -1;
}
.orb-ripples span {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(239,35,60,.5);
  opacity: 0;
  animation: ripple 2s ease-out infinite;
}
.orb-ripples span:nth-child(2) { animation-delay: .5s; }
.orb-ripples span:nth-child(3) { animation-delay: 1s; }
.orb-ripples.hidden span { animation: none; opacity: 0; }
@keyframes ripple {
  0%   { transform: scale(1);   opacity: .6; }
  100% { transform: scale(2.2); opacity: 0; }
}
@keyframes orbFloat {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}
@keyframes orbPulse {
  0%, 100% { box-shadow: 0 0 35px rgba(255,0,70,.85), 0 0 100px rgba(255,0,70,.35); }
  50%       { box-shadow: 0 0 45px rgba(255,0,70,1),   0 0 130px rgba(255,0,70,.5); }
}
@keyframes energyFlow {
  0%   { transform: rotate(0deg)  scale(1); }
  100% { transform: rotate(25deg) scale(1.08); }
}
.welcome-title {
  font-family: 'Manrope', sans-serif;
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 12px;
}
.welcome-sub {
  max-width: 450px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 28px;
}
.quick-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
.quick-btn {
  padding: 12px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.04);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  transition: transform .2s ease, border-color .2s ease, background .2s ease;
  backdrop-filter: blur(10px);
}
.quick-btn:hover {
  transform: translateY(-2px);
  border-color: rgba(239,35,60,.4);
  background: rgba(239,35,60,.08);
}

/* ===== INPUT ZONE ===== */
.input-zone {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-input-zone);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.input-wrap { max-width: 760px; margin: 0 auto; position: relative; }
.chat-input {
  width: 100%;
  min-height: 56px;
  max-height: 180px;
  resize: none;
  overflow-y: auto;
  padding: 16px 104px 16px 18px;
  border-radius: 22px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text);
  outline: none;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  transition: border-color .25s ease, box-shadow .25s ease;
  line-height: 1.5;
}
.chat-input:focus {
  border-color: rgba(239,35,60,.45);
  box-shadow: 0 0 0 1px rgba(239,35,60,.35), 0 0 25px rgba(239,35,60,.18);
}
.chat-input::placeholder { color: var(--placeholder); }
.input-btns {
  position: absolute;
  right: 8px; bottom: 8px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.send-btn {
  width: 40px; height: 40px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--red), var(--red2));
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  transition: transform .2s ease, opacity .2s ease;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { transform: scale(1.06); }
.send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.mic-btn {
  width: 40px; height: 40px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  transition: background .2s ease, color .2s ease, border-color .2s ease;
  display: flex; align-items: center; justify-content: center;
}
.mic-btn:hover { background: rgba(239,35,60,.12); color: var(--red); border-color: rgba(239,35,60,.3); }
.mic-btn.active {
  background: rgba(239,35,60,.2);
  color: var(--red);
  border-color: rgba(239,35,60,.5);
  animation: micPulse .8s infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,35,60,.4); }
  50%       { box-shadow: 0 0 0 6px rgba(239,35,60,0); }
}

/* ===== ATTACHMENTS (pre-send preview) ===== */
#attachmentsPreview {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
#attachmentsPreview.has-files { display: flex; }
.file-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px 8px 12px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  max-width: 220px;
  animation: fadeUp .2s ease;
}
.file-chip.error { border-color: rgba(239,35,60,.5); }
.file-chip-icon { font-size: 18px; flex-shrink: 0; }
.file-chip-info { min-width: 0; overflow: hidden; }
.file-chip-name {
  font-size: 12.5px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-chip-meta { font-size: 10.5px; color: var(--muted); }
.file-chip.error .file-chip-meta { color: var(--red); }
.file-chip-remove {
  border: none;
  background: rgba(255,255,255,.06);
  color: var(--muted);
  width: 20px; height: 20px;
  min-width: 20px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s ease, color .2s ease;
  flex-shrink: 0;
}
.file-chip-remove:hover { background: rgba(239,35,60,.2); color: var(--red); }

/* Drag & drop highlight */
.input-zone.dragover .input-wrap {
  outline: 2px dashed rgba(239,35,60,.5);
  outline-offset: 6px;
  border-radius: 22px;
}

/* Attachments shown inside a sent message bubble */
.msg-attachments {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.msg-file-chip {
  font-size: 11.5px;
  padding: 5px 10px;
  border-radius: 10px;
  background: rgba(255,255,255,.08);
  border: 1px solid var(--border2);
  white-space: nowrap;
}
body.light .msg-file-chip { background: rgba(0,0,0,.05); }

/* ===== TYPING INDICATOR ===== */
.typing-wrap {
  background: var(--bg-msg-ai);
  border: 1px solid var(--border2);
  border-radius: 5px 18px 18px 18px;
  padding: 12px 16px;
  width: fit-content;
  align-self: flex-start;
}

/* ===== SIDEBAR OVERLAY ===== */
.sidebar-overlay { display: none; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
    z-index: 90;
  }
  .sidebar-overlay.show { opacity: 1; pointer-events: auto; }
  .welcome-title { font-size: 28px; }
  .quick-actions { gap: 10px; }
  .quick-btn { width: 100%; max-width: 280px; }
  .msg-user, .msg-ai { max-width: 92%; }
  .ai-orb { width: 90px; height: 90px; }
}

<script>
/* =========================
   CONFIG — replace with your
   actual Render backend URL
========================= */
const API = window.location.origin; // ← UPDATE THIS

/* =========================
   VOICE / MEDIA RECORDER
========================= */
let mediaRecorder  = null;
let audioChunks    = [];
let isRecording    = false;
let isSpeaking     = false;
let mediaStream    = null;
let lastInputWasVoice = false; // scoped, not on window

async function toggleRecording() {
  if (isSpeaking) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    setOrbState('idle');
    return;
  }
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // Pick the best supported mime type
    const mimeType =
      MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' :
      MediaRecorder.isTypeSupported('audio/webm')             ? 'audio/webm' :
      'audio/ogg';

    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      mediaStream.getTracks().forEach(t => t.stop());
      setOrbState('processing');
      await transcribeAudio();
    };

    mediaRecorder.start();
    isRecording = true;
    setOrbState('recording');

  } catch (err) {
    console.error('Mic error:', err);
    setOrbState('idle');
    if (err.name === 'NotAllowedError') {
      alert('Please allow microphone access in your browser settings.');
    } else {
      alert('Microphone error: ' + err.message);
    }
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    isRecording = false;
    mediaRecorder.stop();
  }
}

async function transcribeAudio() {
  try {
    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });

    if (blob.size < 1000) {
      setOrbState('idle');
      const statusEl = document.getElementById('orbStatus');
      if (statusEl) statusEl.textContent = 'Too short — try again';
      setTimeout(() => setOrbState('idle'), 2000);
      return;
    }

    const formData = new FormData();
    formData.append('audio', blob, 'audio.webm');

    const res = await fetch(`${API}/transcribe`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error('Transcription failed (' + res.status + ')');

    const data = await res.json();

    if (data.text && data.text.trim()) {
      chatInput.value = data.text.trim();
      autoResizeInput();
      lastInputWasVoice = true;
      setOrbState('idle');
      sendMessage();
    } else {
      setOrbState('idle');
      const statusEl = document.getElementById('orbStatus');
      if (statusEl) statusEl.textContent = "Couldn't hear you — try again";
      setTimeout(() => setOrbState('idle'), 2500);
    }

  } catch (err) {
    console.error('Transcribe error:', err);
    setOrbState('idle');
    const statusEl = document.getElementById('orbStatus');
    if (statusEl) {
      statusEl.textContent = '⚠ Transcription failed';
      setTimeout(() => setOrbState('idle'), 2500);
    }
  }
}

/* Only touch orb elements if they still exist (welcome screen may have been removed) */
function setOrbState(state) {
  const orb      = document.getElementById('mainOrb');
  const statusEl = document.getElementById('orbStatus');
  const ripples  = document.getElementById('orbRipples');
  const micBtn   = document.getElementById('micBtn');

  // Update orb visuals only when welcome screen is visible
  if (orb) {
    orb.classList.remove('recording', 'processing', 'speaking');
  }
  if (statusEl) {
    statusEl.classList.remove('recording', 'processing', 'speaking');
  }
  if (ripples) ripples.classList.add('hidden');
  if (micBtn)  micBtn.classList.remove('active');

  if (state === 'recording') {
    if (orb)      orb.classList.add('recording');
    if (statusEl) { statusEl.classList.add('recording'); statusEl.textContent = '🔴 Recording… click to stop'; }
    if (ripples)  ripples.classList.remove('hidden');
    if (micBtn)   { micBtn.classList.add('active'); micBtn.textContent = '⏹'; }
    chatInput.placeholder = 'Recording…';

  } else if (state === 'processing') {
    if (orb)      orb.classList.add('processing');
    if (statusEl) { statusEl.classList.add('processing'); statusEl.textContent = '⏳ Transcribing…'; }
    if (micBtn)   micBtn.textContent = '⏳';

  } else if (state === 'speaking') {
    if (orb)      orb.classList.add('speaking');
    if (statusEl) { statusEl.classList.add('speaking'); statusEl.textContent = '🔊 Speaking… click to stop'; }
    if (micBtn)   micBtn.textContent = '⏹';

  } else { // idle
    if (statusEl) statusEl.textContent = 'Click orb to speak';
    if (micBtn)   micBtn.textContent = '🎤';
    chatInput.placeholder = 'Message NightMind…';
  }
}

/* =========================
   SPEECH SYNTHESIS
========================= */
// Pre-load voices as soon as they're available
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function speakChunk(text) {
  if (!window.speechSynthesis) return;

  // Cancel any ongoing speech before starting a new chunk
  window.speechSynthesis.cancel();

  const clean = text
    .replace(/\*\*/g, '')
    .replace(/\*/g, '')
    .replace(/#{1,6}\s/g, '')
    .replace(/`/g, '');

  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate   = 1;
  utter.pitch  = 1;
  utter.volume = 1;
  utter.lang   = 'en-US';

  const voices = speechSynthesis.getVoices();
  const preferred =
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang.startsWith('en')) ||
    voices[0];
  if (preferred) utter.voice = preferred;

  isSpeaking = true;
  setOrbState('speaking');

  utter.onend = () => {
    if (!speechSynthesis.speaking) {
      isSpeaking = false;
      setOrbState('idle');
    }
  };
  utter.onerror = () => {
    isSpeaking = false;
    setOrbState('idle');
  };

  speechSynthesis.speak(utter);
}

/* =========================
   INPUT HANDLING
========================= */
const chatInput = document.getElementById('chat-input');

function autoResizeInput() {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 180) + 'px';

chatInput.addEventListener('input', autoResizeInput);

function handleEnter(e) {

/* =========================
   FILE ATTACHMENTS
========================= */
let attachedFiles = []; // { id, file, name, ext, size, status: 'reading'|'ready'|'error', content }

const TEXT_EXTS = new Set([
  'txt','js','jsx','ts','tsx','mjs','cjs','html','htm','css','scss','less',
  'json','py','cpp','cc','c','h','hpp','java','kt','md','markdown','xml',
  'csv','tsv','yml','yaml','sh','bash','rb','go','rs','php','sql','ini',
  'conf','cfg','log','env','toml','vue','svelte','gitignore'
]);
const IMAGE_EXTS = new Set(['png','jpg','jpeg','gif','webp','bmp','svg']);
const MAX_FILE_CHARS = 15000;

// Make sure pdf.js knows where to find its worker
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

function getExt(filename) {
  const parts = filename.split('.');
  return parts.length > 1 ? parts.pop().toLowerCase() : '';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function fileIcon(ext) {
  if (IMAGE_EXTS.has(ext)) return '🖼️';
  if (ext === 'pdf') return '📕';
  if (ext === 'docx' || ext === 'doc') return '📘';
  if (ext === 'xlsx' || ext === 'xls') return '📊';
  if (ext === 'zip' || ext === 'rar' || ext === '7z') return '🗜️';
  if (['js','jsx','ts','tsx','py','java','cpp','c','html','css','json'].includes(ext)) return '💻';
  return '📄';
}

function truncateContent(text) {
  if (!text) return text;
  if (text.length <= MAX_FILE_CHARS) return text;
  return text.slice(0, MAX_FILE_CHARS) +
    `\n...[truncated — showing first ${MAX_FILE_CHARS} characters]`;
}

async function extractPdfText(file) {
  if (!window.pdfjsLib) return '[PDF support unavailable — library failed to load]';
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return text.trim() || '[No extractable text found in this PDF]';
}

async function extractDocxText(file) {
  if (!window.mammoth) return '[DOCX support unavailable — library failed to load]';
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return (result.value || '').trim() || '[No extractable text found in this document]';
}

async function extractSheetText(file) {
  if (!window.XLSX) return '[Spreadsheet support unavailable — library failed to load]';
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array' });
  let out = '';
  wb.SheetNames.forEach(name => {
    const sheet = wb.Sheets[name];
    out += `--- Sheet: ${name} ---\n${XLSX.utils.sheet_to_csv(sheet)}\n\n`;
  });
  return out.trim() || '[No data found in this spreadsheet]';
}

async function extractFileContent(file, ext) {
  if (TEXT_EXTS.has(ext) || ext === '') {
    try { return await file.text(); }
    catch { return `[Could not read "${file.name}" as text]`; }
  }
  if (ext === 'pdf') return extractPdfText(file);
  if (ext === 'docx') return extractDocxText(file);
  if (ext === 'xlsx' || ext === 'xls') return extractSheetText(file);
  if (IMAGE_EXTS.has(ext)) {
    return `[Image file "${file.name}" attached — visual content not extracted as text]`;
  }
  // Unknown binary-ish type — best-effort text read, else flag it
  try {
    const text = await file.text();
    if (/[\x00-\x08\x0E-\x1F]/.test(text.slice(0, 500))) {
      return `[Could not extract readable text from "${file.name}" — unsupported file type]`;
    }
    return text;
  } catch {
    return `[Could not extract readable text from "${file.name}" — unsupported file type]`;
  }
}

function renderAttachments() {
  const wrap = document.getElementById('attachmentsPreview');
  if (!wrap) return;
  wrap.innerHTML = '';
  wrap.classList.toggle('has-files', attachedFiles.length > 0);

  attachedFiles.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'file-chip' + (f.status === 'error' ? ' error' : '');

    const icon = document.createElement('span');
    icon.className = 'file-chip-icon';
    icon.textContent = fileIcon(f.ext);

    const info = document.createElement('div');
    info.className = 'file-chip-info';
    const nameEl = document.createElement('div');
    nameEl.className = 'file-chip-name';
    nameEl.textContent = f.name;
    const metaEl = document.createElement('div');
    metaEl.className = 'file-chip-meta';
    metaEl.textContent = f.status === 'reading' ? 'Reading…' :
                          f.status === 'error'   ? 'Error reading file' :
                          formatSize(f.size);
    info.appendChild(nameEl);
    info.appendChild(metaEl);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'file-chip-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove file';
    removeBtn.onclick = () => removeAttachment(f.id);

    chip.appendChild(icon);
    chip.appendChild(info);
    chip.appendChild(removeBtn);
    wrap.appendChild(chip);
  });
}

function removeAttachment(id) {
  attachedFiles = attachedFiles.filter(f => f.id !== id);
  renderAttachments();
}

function handleIncomingFiles(fileList) {
  Array.from(fileList).forEach(file => {
    const id = 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const ext = getExt(file.name);
    const entry = { id, file, name: file.name, ext, size: file.size, status: 'reading', content: '' };
    attachedFiles.push(entry);
    renderAttachments();

    extractFileContent(file, ext)
      .then(content => {
        entry.content = truncateContent(content);
        entry.status = 'ready';
        renderAttachments();
      })
      .catch(err => {
        console.error('File read error:', err);
        entry.status = 'error';
        entry.content = `[Error reading "${file.name}": ${err.message}]`;
        renderAttachments();
      });
  });
}

// Render a saved/sent message, splitting out any embedded file block
// into clean chips instead of dumping raw file text into the bubble.
function renderMessageBody(div, content) {
  const marker = '\n\nAttached Files:\n';
  const idx = content.indexOf(marker);
  if (idx === -1) {
    div.textContent = content;
    return;
  }
  const mainText  = content.slice(0, idx);
  const filesPart = content.slice(idx + marker.length);
  const fileNames = [...filesPart.matchAll(/-{5} (.+?) -{5}/g)].map(m => m[1]);

  div.textContent = mainText || '(sent with attachment)';

  if (fileNames.length) {
    const row = document.createElement('div');
    row.className = 'msg-attachments';
    fileNames.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'msg-file-chip';
      chip.textContent = '📄 ' + name;
      row.appendChild(chip);
    });
    div.appendChild(row);
  }
}

// Wire up attach button, hidden file input, and drag & drop
const fileInputEl = document.getElementById('fileInput');
const attachBtn   = document.getElementById('attachBtn');
const inputZone   = document.getElementById('inputZone');

attachBtn.onclick = () => fileInputEl.click();

fileInputEl.addEventListener('change', () => {
  handleIncomingFiles(fileInputEl.files);
  fileInputEl.value = ''; // allow re-selecting the same file later
});

['dragenter', 'dragover'].forEach(evt => {
  inputZone.addEventListener(evt, e => {
    e.preventDefault();
    inputZone.classList.add('dragover');
  });
});
['dragleave', 'drop'].forEach(evt => {
  inputZone.addEventListener(evt, e => {
    e.preventDefault();
    inputZone.classList.remove('dragover');
  });
});
inputZone.addEventListener('drop', e => {
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
    handleIncomingFiles(e.dataTransfer.files);
  }
});

let currentChatId = null;
let chats = JSON.parse(localStorage.getItem('nightmind_chats') || '{}');

function saveChats() {
  localStorage.setItem('nightmind_chats', JSON.stringify(chats));
}

function renderHistory() {
  const histEl = document.getElementById('history');
  histEl.innerHTML = '';
  const ids = Object.keys(chats).reverse();
  ids.forEach(chatId => {
    const item = document.createElement('div');
    item.className = 'hist-item' + (chatId === currentChatId ? ' active' : '');
    item.textContent = chats[chatId].title;
    item.onclick = () => { loadChat(chatId); closeSidebar(); };
    histEl.appendChild(item);
  });
}

function createChat(firstMessage = 'New Chat') {
  let title = firstMessage
    .replace(/\n/g, ' ')
    .replace(/[^\w\s]/gi, '')
    .trim()
    .substring(0, 35);
  title = title.charAt(0).toUpperCase() + title.slice(1);
  if (!title || title.length < 2) title = 'New Chat';

  currentChatId = 'chat_' + Date.now();
  chats[currentChatId] = { title, messages: [] };
  saveChats();
  renderHistory();
}

/* FIX: ensure currentChatId exists before pushing a message */
function saveMessage(role, content) {
  if (!currentChatId || !chats[currentChatId]) {
    createChat(content);
  }
  chats[currentChatId].messages.push({ role, content });
  saveChats();
}

function loadChat(chatId) {
  currentChatId = chatId;
  renderHistory();

  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = '';

  chats[chatId].messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = msg.role === 'user' ? 'msg-user' : 'msg-ai';
    renderMessageBody(div, msg.content);
    messagesEl.appendChild(div);
  });

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* =========================
   SEND MESSAGE
========================= */
let isBusy = false;

async function sendMessage() {
  if (isBusy) return;
  const text = chatInput.value.trim();
  if (!text && attachedFiles.length === 0) return;

  if (attachedFiles.some(f => f.status === 'reading')) {
    alert('Still reading attached files — one moment and try again.');
    return;
  }

  // Capture and clear voice flag before async gap
  const wasVoice = lastInputWasVoice;
  lastInputWasVoice = false;

  chatInput.value = '';
  chatInput.style.height = '56px';

  const messagesEl = document.getElementById('messages');
  const welcome    = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Fold any attached files into the message with clear boundaries
  // so the AI receives full file context alongside the user's question.
  let contentToSend = text;
  if (attachedFiles.length > 0) {
    const block = attachedFiles
      .map(f => `----- ${f.name} -----\n${f.content}`)
      .join('\n\n');
    contentToSend = (text || 'Please review the attached file(s).') +
      '\n\nAttached Files:\n' + block;
  }
  attachedFiles = [];
  renderAttachments();

  // User bubble
  const userDiv = document.createElement('div');
  userDiv.className = 'msg-user';
  renderMessageBody(userDiv, contentToSend);
  messagesEl.appendChild(userDiv);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  // Ensure chat exists before saving
  if (!currentChatId) createChat(text || 'Attachment');
  saveMessage('user', contentToSend);

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing-wrap';
  typing.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;">
      <div class="live-dot"></div>
      NightMind is thinking…
    </div>`;
  messagesEl.appendChild(typing);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  isBusy = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const selectedModel = document.getElementById('modelSelect').value;
    const history = (chats[currentChatId]?.messages || []).slice(-20);

    const response = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: selectedModel,
        messages: history,
        temperature: 0.7,
        max_tokens: 1000
      })
    });

    if (!response.ok) throw new Error('Server error ' + response.status);

    const data = await response.json();
    typing.remove();

    const reply =
      data?.choices?.[0]?.message?.content ||
      '⚠ Unexpected response format.';

    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg-ai';
    messagesEl.appendChild(aiDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    // Typewriter — controlled speed (1.5ms per char feels natural)
    await typewrite(aiDiv, reply, messagesEl, wasVoice);

    saveMessage('assistant', reply);

  } catch (err) {
    console.error('Chat error:', err);
    typing.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg-ai';
    errDiv.textContent = '⚠ ' + err.message;
    messagesEl.appendChild(errDiv);

  } finally {
    isBusy = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

/* FIX: Controlled typewriter with adjustable speed, no rAF storm */
function typewrite(el, text, container, speakAloud) {
  return new Promise(resolve => {
    let i = 0;
    let spokenChunk = '';
    const SPEED = 12; // ms per character — adjust to taste

    function next() {
      if (i < text.length) {
        const ch = text[i++];
        el.textContent += ch;
        container.scrollTop = container.scrollHeight;

        if (speakAloud) {
          spokenChunk += ch;
          if (ch === '.' || ch === '?' || ch === '!' || spokenChunk.length > 120) {
            speakChunk(spokenChunk);
            spokenChunk = '';
          }
        }

        setTimeout(next, SPEED);
      } else {
        if (speakAloud && spokenChunk.trim()) speakChunk(spokenChunk);
        resolve();
      }
    }

    next();
  });
}

/* =========================
   INIT — load last chat
========================= */
(function init() {
  // Apply theme first (already called above, harmless to call again)
  applyTheme();

  const ids = Object.keys(chats);
  if (ids.length > 0) {
    currentChatId = ids[ids.length - 1];
    renderHistory();
    loadChat(currentChatId);
  } else {
    renderHistory(); // empty — sidebar shows nothing
  }
})();

/* =========================
   MOBILE: resume AudioContext
   on first interaction
========================= */
window.addEventListener('click', () => {
  if (window.speechSynthesis) window.speechSynthesis.resume();
}, { once: false });

window.addEventListener('load', () => {
  console.log('NightMind loaded successfully 🚀');
});
